
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando | Gianluca Paredes</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego()">

  <header>
    <h1>Juego Cazando</h1>
    <p class="autor">Autor: <strong>Gianluca Paredes</strong></p>
  </header>

  <main>
    <div class="panel">
      <span>Puntos: <strong id="puntos">0</strong></span>
      <span>Tiempo: <strong id="tiempo">10</strong>s</span>
    </div>

    <canvas id="areaJuego" width="500" height="500"></canvas>

    <div id="mensaje" role="alert"></div>

    <nav class="controles">
      <div class="flechas">
        <button onclick="moverArriba()" aria-label="Mover arriba">⬆</button>
        <div class="fila-horizontal">
          <button onclick="moverIzquierda()" aria-label="Mover izquierda">⬅</button>
          <button onclick="moverAbajo()" aria-label="Mover abajo">⬇</button>
          <button onclick="moverDerecha()" aria-label="Mover derecha">➡</button>
        </div>
      </div>
      <button class="btn-reiniciar" onclick="reiniciarJuego()">Reiniciar Juego</button>
    </nav>
  </main>

  <!-- Scripts al final para mejor carga -->
  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>
</html>
